  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Standalone confirmation page; keep it out of search results. -->
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon-16.png" />

  <meta name="theme-color" content="#14110D" media="(prefers-color-scheme: dark)" />
  <title>Thanks — Project Summit</title>
  <meta name="description" content="Thanks for reaching out to Project Summit." />
  <link rel="canonical" href="https://projectsummit.app/thanks.html" />
  <meta property="og:type" content="website" />

  <meta property="og:description" content="Thanks for reaching out to Project Summit." />
  <meta property="og:image" content="https://projectsummit.app/assets/img/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Thanks — Project Summit" />
  <meta name="twitter:description" content="Thanks for reaching out to Project Summit." />
  <meta name="twitter:image" content="https://projectsummit.app/assets/img/og-image.png" />

  <link rel="stylesheet" href="assets/css/summit.css" />

  <!-- Follow the user's stored / system theme (no nav on this standalone page). -->
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem('summit_site_v1') || '{}');
        var dark = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches);
        var t = s.themeExplicit ? s.theme : (dark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>

  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .thanks-card {
      position: relative; z-index: 1;
      background: var(--card); border: 1px solid var(--ink-hair);
      border-radius: var(--r-card); padding: 48px 40px; max-width: 480px; width: 100%;
      text-align: center; box-shadow: var(--e3);
    }
    .thanks-logo { width: 44px; height: 44px; border-radius: 10px; overflow: hidden; margin: 0 auto 26px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .thanks-badge { width: 64px; height: 64px; margin: 0 auto 26px; border-radius: 50%; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; color: var(--accent); }
    .thanks-eyebrow { font-family: var(--font-mono); font-size: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .thanks-card h1 { font-family: var(--font-serif); font-style: italic; font-weight: 400; font-size: 38px; line-height: 1.1; color: var(--ink); margin-bottom: 16px; }
    .thanks-lead { color: var(--ink-soft); font-size: 16px; line-height: 1.7; margin-bottom: 30px; }
    .thanks-actions { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .thanks-home { font-family: var(--font-ui); font-size: 14px; color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--ink-hair); transition: color 0.15s, border-color 0.15s; }
    .thanks-home:hover { color: var(--accent); border-color: var(--accent); }
    .thanks-follow { margin-top: 26px; font-size: 14px; color: var(--ink-soft); }
    .thanks-follow a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--ink-hair); }
    .thanks-follow a:hover { color: var(--accent); border-color: var(--accent); }
    @media (max-width: 480px) { .thanks-card { padding: 40px 24px; } .thanks-card h1 { font-size: 32px; } }
  </style>
</head>
<body>
  <main class="thanks-card">
    <div class="thanks-logo"><img src="assets/img/summit-logo.png" alt="Summit" /></div>
    <div class="thanks-badge" aria-hidden="true">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <p class="thanks-eyebrow">Project Summit</p>
    <h1>Thanks — see you in the app</h1>
    <p class="thanks-lead">We've got your message. Summit is on the App Store now — download it, connect Strava, and let the plan start learning you.</p>
    <div class="thanks-actions">
      <a href="https://apps.apple.com/app/id6754172654" data-source="thanks" class="appstore"><img class="appstore-img" alt="Download on the App Store" src="assets/img/appstore-badges/Download_on_the_App_Store_Badge_ES_RGB_blk_100217.svg" /></a>
      <a class="thanks-home" href="index.html">Back to home</a>
    </div>
    <p class="thanks-follow">Follow along on <a href="https://instagram.com/projectsummit.app" target="_blank" rel="noopener">Instagram</a></p>
  </main>

  <script>
    // Standalone page (no app.js): pick the App Store badge by stored language +
    // resolved theme, mirroring app.js updateBadges().
    (function () {
      var img = document.querySelector('.appstore .appstore-img');
      if (!img) return;
      var lang = 'es';
      try {
        var s = JSON.parse(localStorage.getItem('summit_site_v1') || '{}');
        if (s.lang === 'en' || s.lang === 'ca' || s.lang === 'es') lang = s.lang;
      } catch (e) {}
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      var B = {
        en: { black: 'US-UK_RGB_blk_092917', white: 'US-UK_RGB_wht_092917' },
        es: { black: 'ES_RGB_blk_100217',    white: 'ES_RGB_wht_100217' },
        ca: { black: 'CAES_blk_082124',      white: 'CAES_wht_082124' }
      };
      img.src = 'assets/img/appstore-badges/Download_on_the_App_Store_Badge_' + B[lang][dark ? 'white' : 'black'] + '.svg';
    })();
  </script>
  <script>
    // Fire a lightweight view event once per session.
    (function () {
      try {
        if (sessionStorage.getItem('ps_thanks_viewed') === '1') return;
        sessionStorage.setItem('ps_thanks_viewed', '1');
      } catch (e) {}
      if (window.posthog) posthog.capture('thanks_viewed');
    })();
  </script>
  <script src="assets/js/analytics.js"></script>
  <script src="assets/js/consent.js"></script>
</body>
</html>
