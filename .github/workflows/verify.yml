name: Verify

# Quality gate on every push / PR: i18n coverage, internal links, and that the
# generated shell is in sync with partials/. Read-only (no writes).

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: i18n coverage (every data-i18n key has ES + CA)
        run: node tools/check-i18n.js

      - name: Internal links, assets and anchors resolve
        run: node tools/check-links.js

      - name: Shell is in sync with partials/
        run: |
          node build.js
          if [ -n "$(git status --porcelain -- '*.html')" ]; then
            echo "::error::Generated shell is stale — run 'npm run build' and commit."
            git --no-pager diff -- '*.html'
            exit 1
          fi
          echo "Shell is in sync."
