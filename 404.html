<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png" />
  <title>Page not found — Project Summit</title>
  <link rel="stylesheet" href="/assets/css/summit.css" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem('summit_site_v1') || '{}');
        var dark = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', s.themeExplicit ? s.theme : (dark ? 'dark' : 'light'));
      } catch (e) {}
    })();
  </script>
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .nf { position: relative; z-index: 1; text-align: center; max-width: 460px; }
    .nf-code { font-family: var(--font-serif); font-style: italic; font-size: clamp(4rem, 18vw, 8rem); line-height: 1; color: var(--accent); }
    .nf h1 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; color: var(--ink); margin: 8px 0 14px; }
    .nf p { color: var(--ink-soft); font-size: 16px; line-height: 1.7; margin-bottom: 28px; }
    .nf-home { display: inline-flex; align-items: center; height: 48px; padding: 0 24px; background: var(--accent); color: #fff; border-radius: var(--r-button); text-decoration: none; font-weight: 600; font-size: 14px; transition: opacity 0.15s; }
    .nf-home:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <main class="nf">
    <div class="nf-code">404</div>
    <h1>This trail doesn't exist</h1>
    <p>The page you're looking for moved or never existed. Let's get you back on route.</p>
    <a class="nf-home" href="/">Back to home</a>
  </main>
</body>
</html>
